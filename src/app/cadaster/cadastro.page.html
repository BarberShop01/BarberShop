<ion-content class="cadastroIni">
  <div class="cadastro-container">
    <div class="Logo-cadastro">
      <img src="assets/cadaster/Logo-cadastro.png" alt="Logo do cadastro" class="ImgLogo-cadastro">
    </div>

    <ion-item class="input-box">
      <ion-icon name="mail-outline" slot="start"></ion-icon>
      <ion-input type="email" placeholder="E-mail" clearInput></ion-input>
    </ion-item>

    <ion-item class="input-box-locked">
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-input type="password" placeholder="Senha" clearInput></ion-input>
    </ion-item>

    <div class="options">
      <ion-checkbox slot="start"></ion-checkbox>
      <span>Lembrar-me</span>
      <a (click)="irParaEsqueciSenha()">Esqueceu a senha?</a>
    </div>

    <ion-button expand="full" class="login-button" fill="clear">Login</ion-button>

    <p class="register-login">Não tem login?<a href="#"> Cadastre-se</a></p>
  </div>
</ion-content>
